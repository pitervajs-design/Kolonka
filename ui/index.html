<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kolonka AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="frame">
    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="pixel-icon">
          <div class="pixel-cube"></div>
        </div>
        <span class="topbar-title">KOLONKA AI</span>
        <span class="topbar-version" id="versionLabel"></span>
      </div>
      <div class="topbar-right">
        <button class="win-btn win-min" title="Minimize">_</button>
        <button class="win-btn win-max" title="Maximize">[]</button>
        <button class="win-btn win-close" title="Close">X</button>
      </div>
    </div>
    <div class="topbar-accent"></div>

    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-label">МЕНЮ</div>

        <nav class="sidebar-nav">
          <a class="nav-item active" data-page="chat">
            <span class="nav-pixel-icon">&#9993;</span>
            <span>ЧАТ</span>
          </a>
          <a class="nav-item" data-page="music">
            <span class="nav-pixel-icon">&#9835;</span>
            <span>МУЗЫКА</span>
          </a>
          <a class="nav-item" data-page="home">
            <span class="nav-pixel-icon">&#8962;</span>
            <span>УМНЫЙ ДОМ</span>
          </a>
          <a class="nav-item" data-page="alarms">
            <span class="nav-pixel-icon">&#9200;</span>
            <span>БУДИЛЬНИКИ</span>
          </a>
          <a class="nav-item" data-page="skills">
            <span class="nav-pixel-icon">&#9889;</span>
            <span>НАВЫКИ</span>
          </a>
          <a class="nav-item" data-page="settings">
            <span class="nav-pixel-icon">&#9881;</span>
            <span>НАСТРОЙКИ</span>
          </a>
        </nav>

        <!-- Skills panel -->
        <div class="settings-panel" id="skillsPanel" style="display:none;">
          <div class="skill-item">
            <div class="skill-name">ЭМОЦИИ</div>
            <div class="skill-desc">Если в тексте есть слова "злой" или злой/грустный смайлик, лицо агента меняется на злое во время ответа</div>
          </div>
        </div>

        <!-- Settings panel -->
        <div class="settings-panel" id="settingsPanel" style="display:none;">
          <div class="settings-group">
            <label>МИКРОФОН</label>
            <select id="micSelect"></select>
          </div>
          <div class="settings-group">
            <button class="mc-btn settings-btn" id="btnVad">
              <span id="vadLabel">VAD: ВЫКЛ</span>
            </button>
          </div>
          <div class="settings-group">
            <button class="mc-btn settings-btn" id="btnClear">
              <span>ОЧИСТИТЬ</span>
            </button>
          </div>
        </div>

        <!-- Sidebar footer -->
        <div class="sidebar-footer">
          <div class="pixel-speaker">
            <div class="speaker-body">
              <div class="speaker-cone"></div>
            </div>
          </div>
          <div class="footer-info">
            <div class="footer-name">KOLONKA AI</div>
            <div class="footer-status">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusText">ЗАПУСК</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main">
        <div class="chat-header">
          <span class="chat-header-deco">[</span>
          <span>ЧАТ С KOLONKA AI</span>
          <span class="chat-header-deco">]</span>
        </div>

        <div class="chat" id="chat">
          <div class="chat-msg system">Инициализация...</div>
        </div>

        <!-- Bottom input bar -->
        <div class="input-bar">
          <button class="mc-btn mic-btn" id="btnPtt" title="Push-to-Talk (Space)">
            <span class="mic-icon">&#127908;</span>
          </button>
          <input type="text" class="input-field" id="textInput" placeholder="Напишите сообщение..." autocomplete="off">
          <button class="mc-btn send-btn" id="sendBtn">ОТПРАВИТЬ</button>
        </div>
      </main>
    </div>
  </div>

  <span id="modeLabel" style="display:none">PTT</span>
  <span id="statusInfo" style="display:none"></span>
  <span id="stateLabel" style="display:none"></span>

  <script src="renderer.js"></script>
</body>
</html>
